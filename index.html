<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>创业项目展示</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="nav-bar">
    <a href="index.html" class="logo">BP Showcase.</a>
    <div class="nav-links" id="navLinks"></div>
  </nav>

  <header class="hero-section">
    <h1 class="hero-title">创新 · 洞见 · 价值</h1>
    <p class="hero-subtitle" id="heroSubtitle">探索前沿商业构想，见证每一个改变世界的可能</p>
  </header>

  <section class="global-highlights" id="about">
    <div class="bento-card highlight-large">
      <h3>累计覆盖市场规模</h3>
      <div class="giant-number">1000亿+</div>
    </div>
    <div class="bento-card highlight-small">
      <h3>收录精选项目</h3>
      <div class="giant-number" id="totalProjectsCount">1</div>
    </div>
    <div class="bento-card highlight-small">
      <h3>核心聚焦领域</h3>
      <div class="giant-number">前沿消费</div>
    </div>
  </section>

  <section class="projects-section" id="projects">
    <div class="section-header">
      <h2>精选项目</h2>
    </div>
    
    <div id="projectsGrid"></div>
  </section>

  <script src="config.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.getElementById('navLinks').innerHTML = NAV_LINKS.map(link =>
      `<a href="${link.href}" class="nav-link">${link.label}</a>`
    ).join('');
    
    document.getElementById('totalProjectsCount').textContent = PROJECTS.length;
    
    initProjectsGrid('#projectsGrid');
  </script>
</body>
</html>
