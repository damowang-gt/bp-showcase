<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>惊喜食光 · 技术文档（授权访问）</title>
  <style>
    :root {
      --primary: #FF6B35;
      --bg: #0F1117;
      --card: #1A1D2B;
      --text: #E8E8EC;
      --text-s: #8B8FA3;
      --border: #2A2E42;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .login-bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 30%, rgba(255,107,53,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(230,57,70,0.05) 0%, transparent 60%);
      z-index: 1;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 36px;
      position: relative;
      overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), #E63946, var(--primary));
    }
    .lock-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: rgba(255,107,53,0.12);
      border: 1px solid rgba(255,107,53,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .lock-icon svg {
      width: 26px;
      height: 26px;
      stroke: var(--primary);
    }
    .login-card h1 {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }
    .login-card .subtitle {
      font-size: 13px;
      color: var(--text-s);
      text-align: center;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-s);
      margin-bottom: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .form-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input::placeholder {
      color: #4A4E67;
    }
    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255,107,53,0.12);
    }
    .submit-btn {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
      font-family: inherit;
      letter-spacing: 1px;
    }
    .submit-btn:hover {
      background: #e55a27;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255,107,53,0.35);
    }
    .submit-btn:active {
      transform: translateY(0);
    }
    .error-msg {
      background: rgba(230,57,70,0.1);
      border: 1px solid rgba(230,57,70,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #E63946;
      margin-bottom: 18px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .error-msg.show {
      display: flex;
    }
    .error-msg svg {
      width: 16px;
      height: 16px;
      stroke: #E63946;
      flex-shrink: 0;
    }
    .hint {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .hint p {
      font-size: 11px;
      color: #4A4E67;
      line-height: 1.8;
    }
    .hint strong {
      color: var(--text-s);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="login-bg"></div>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="lock-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </div>
      <h1>授权访问</h1>
      <p class="subtitle">惊喜食光 · 业务流程与技术架构文档</p>

      <div class="error-msg" id="errorMsg">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorText">账号或密码错误，请重试</span>
      </div>

      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label>账 号</label>
          <input type="text" id="username" placeholder="请输入账号" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label>密 码</label>
          <input type="password" id="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">立即访问</button>
      </form>

      <div class="hint">
        <p><strong>账号：</strong>admin &nbsp;|&nbsp; <strong>密码：</strong>agentvc2026</p>
        <p style="margin-top:4px;">本页面为内部技术文档，请勿对外传播</p>
      </div>
    </div>
  </div>

  <script>
    const VALID_USER = 'admin';
    const VALID_PASS = 'agentvc2026';

    function handleLogin(e) {
      e.preventDefault();
      var user = document.getElementById('username').value.trim();
      var pass = document.getElementById('password').value;
      var errorMsg = document.getElementById('errorMsg');
      var btn = document.getElementById('submitBtn');

      if (user === VALID_USER && pass === VALID_PASS) {
        sessionStorage.setItem('tech_doc_auth', '1');
        window.location.href = 'index.html';
        return false;
      } else {
        errorMsg.classList.add('show');
        document.getElementById('username').focus();
      }
      return false;
    }
  </script>
</body>
</html>
